<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AI 유튜브 대본 생성기 — 5채널 통합</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#0d0f12;color:#e8ecf4;min-height:100vh;}

/* ── TOPBAR ── */
.topbar{background:#141720;border-bottom:1px solid rgba(255,255,255,0.08);height:52px;display:flex;align-items:center;padding:0 1.5rem;gap:12px;position:sticky;top:0;z-index:100;}
.logo-dot{width:9px;height:9px;border-radius:50%;background:#3b82f6;}
.logo-text{font-size:14px;font-weight:700;}
.topbar-right{margin-left:auto;font-size:11px;color:#555d72;font-family:'JetBrains Mono',monospace;}

/* ── CHANNEL TABS ── */
.ch-tabs{display:flex;gap:0;border-bottom:1px solid rgba(255,255,255,0.08);background:#141720;padding:0 1.5rem;overflow-x:auto;}
.ch-tab{padding:12px 20px;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:#555d72;white-space:nowrap;transition:all 0.15s;}
.ch-tab:hover{color:#8b92a8;}
.ch-tab.active{color:#e8ecf4;border-bottom-color:var(--ch-accent);}

/* ── LAYOUT ── */
.layout{display:grid;grid-template-columns:360px 1fr;min-height:calc(100vh - 100px);}
.sidebar{background:#141720;border-right:1px solid rgba(255,255,255,0.08);padding:1.25rem;overflow-y:auto;display:flex;flex-direction:column;gap:0.875rem;}
.main{padding:1.25rem;overflow-y:auto;display:flex;flex-direction:column;gap:0.875rem;}

/* ── CARDS ── */
.card{background:#1c2030;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:1.125rem;}
.card-title{font-size:10px;font-weight:700;color:#555d72;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;}

/* ── FORM ── */
label{font-size:12px;color:#8b92a8;display:block;margin-bottom:4px;}
input[type=text],input[type=password],textarea{width:100%;background:#0d0f12;border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:8px 10px;font-size:13px;color:#e8ecf4;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color 0.15s;}
input:focus,textarea:focus{border-color:var(--ch-accent);}
textarea{resize:vertical;line-height:1.6;min-height:60px;}
.form-row{margin-bottom:9px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px;}

/* ── URL chips ── */
.url-add-row{display:flex;gap:7px;}
.url-add-row input{flex:1;}
.btn-sm{font-size:12px;padding:8px 12px;border:1px solid rgba(255,255,255,0.12);border-radius:8px;background:transparent;color:#8b92a8;cursor:pointer;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;transition:all 0.15s;}
.btn-sm:hover{background:#1c2030;color:#e8ecf4;}
.url-chips{display:flex;flex-direction:column;gap:5px;margin-top:8px;}
.chip{display:flex;align-items:center;gap:7px;background:#0d0f12;border:1px solid rgba(255,255,255,0.08);border-radius:7px;padding:5px 9px;font-size:11px;}
.chip-label{font-size:9px;padding:2px 6px;border-radius:8px;font-weight:700;flex-shrink:0;}
.chip-yt{background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.2);}
.chip-news{background:rgba(59,130,246,0.15);color:#3b82f6;border:1px solid rgba(59,130,246,0.2);}
.chip-url{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#8b92a8;}
.chip-del{cursor:pointer;color:#555d72;font-size:15px;}
.chip-del:hover{color:#ef4444;}

/* ── TONE TAGS ── */
.tag-row{display:flex;flex-wrap:wrap;gap:5px;}
.tag{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid rgba(255,255,255,0.08);cursor:pointer;color:#8b92a8;background:transparent;transition:all 0.15s;}
.tag.active{background:rgba(59,130,246,0.15);color:var(--ch-accent);border-color:var(--ch-accent);}

/* ── GENERATE BUTTON ── */
.btn-gen{width:100%;padding:12px;font-size:14px;font-weight:700;border:none;border-radius:8px;background:var(--ch-accent);color:#fff;cursor:pointer;transition:background 0.15s;font-family:'Noto Sans KR',sans-serif;}
.btn-gen:hover{filter:brightness(1.15);}
.btn-gen:disabled{opacity:0.4;cursor:not-allowed;}

/* ── PIPELINE ── */
.pipe-steps{display:flex;flex-direction:column;}
.pipe-step{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.06);}
.pipe-step:last-child{border-bottom:none;}
.step-icon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px;}
.icon-wait{background:#141720;color:#555d72;border:1px solid rgba(255,255,255,0.1);}
.icon-run{background:rgba(59,130,246,0.15);color:#3b82f6;border:1px solid rgba(59,130,246,0.3);}
.icon-done{background:rgba(34,197,94,0.12);color:#22c55e;border:1px solid rgba(34,197,94,0.25);}
.icon-err{background:rgba(239,68,68,0.12);color:#ef4444;border:1px solid rgba(239,68,68,0.25);}
.step-title{font-size:12px;font-weight:500;color:#e8ecf4;}
.step-detail{font-size:11px;color:#8b92a8;margin-top:3px;line-height:1.5;}
.spin{display:inline-block;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── VERIFY BADGES ── */
.verify-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.vbadge{font-size:10px;padding:2px 7px;border-radius:8px;border:1px solid;font-weight:500;}
.vbadge-pass{background:rgba(34,197,94,0.1);color:#22c55e;border-color:rgba(34,197,94,0.25);}
.vbadge-fail{background:rgba(239,68,68,0.1);color:#ef4444;border-color:rgba(239,68,68,0.25);}
.vbadge-wait{background:#141720;color:#555d72;border-color:rgba(255,255,255,0.08);}

/* ── STATS ── */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.stat{background:#1c2030;border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:11px;text-align:center;}
.stat-n{font-size:18px;font-weight:700;color:#e8ecf4;font-family:'JetBrains Mono',monospace;}
.stat-l{font-size:10px;color:#555d72;margin-top:2px;}

/* ── OUTPUT ── */
.output-box{background:#141720;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:1.125rem;flex:1;}
.output-text{font-size:13px;line-height:1.9;color:#e8ecf4;white-space:pre-wrap;word-break:break-word;max-height:calc(100vh - 260px);overflow-y:auto;font-family:'Noto Sans KR',sans-serif;}
.output-text::-webkit-scrollbar{width:3px;}
.output-text::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:2px;}
.copy-btn{font-size:11px;padding:4px 11px;border:1px solid rgba(255,255,255,0.12);border-radius:7px;background:transparent;color:#8b92a8;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.copy-btn:hover{color:#e8ecf4;}
.empty-state{text-align:center;padding:3rem 1rem;color:#555d72;}
.hint{font-size:11px;color:#555d72;margin-top:5px;}
.hint a{color:#3b82f6;text-decoration:none;}

/* channel panel visibility */
.ch-panel{display:none;}
.ch-panel.active{display:contents;}

@media(max-width:768px){
  .layout{grid-template-columns:1fr;}
  .sidebar{border-right:none;border-bottom:1px solid rgba(255,255,255,0.08);}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo-dot"></div>
  <span class="logo-text">AI 유튜브 대본 생성기</span>
  <span class="topbar-right">Gemini 2.5 Flash · 5채널 통합 · 5중 검증</span>
</div>

<!-- CHANNEL TABS -->
<div class="ch-tabs" id="ch-tabs">
  <div class="ch-tab active" data-ch="today" style="--ch-accent:#3b82f6" onclick="switchCh('today',this)">📈 오늘경제TV</div>
  <div class="ch-tab" data-ch="ripple" style="--ch-accent:#6366f1" onclick="switchCh('ripple',this)">💎 리플(XRP)</div>
  <div class="ch-tab" data-ch="shiba" style="--ch-accent:#f59e0b" onclick="switchCh('shiba',this)">🐕 시바이누</div>
  <div class="ch-tab" data-ch="crypto" style="--ch-accent:#06b6d4" onclick="switchCh('crypto',this)">🔮 크립토툰</div>
  <div class="ch-tab" data-ch="stock" style="--ch-accent:#10b981" onclick="switchCh('stock',this)">🖌️ 그려보는주식</div>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="main-area">
    <div id="pipeline-card" class="card" style="display:none;">
      <div class="card-title">처리 파이프라인</div>
      <div class="pipe-steps" id="pipe-steps"></div>
    </div>
    <div class="stat-grid" id="stats-grid" style="display:none;"></div>
    <div class="output-box">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <span style="font-size:12px;font-weight:600;color:#8b92a8;">완성된 대본</span>
        <button class="copy-btn" id="copy-btn" onclick="copyScript()" style="display:none;">복사</button>
      </div>
      <div id="empty-state" class="empty-state">
        <div style="font-size:32px;margin-bottom:10px;opacity:0.3;">📋</div>
        <div style="font-size:13px;line-height:1.7;">채널 탭을 선택하고<br>URL을 추가한 뒤<br>생성 버튼을 눌러주세요</div>
      </div>
      <div class="output-text" id="output-text" style="display:none;"></div>
    </div>
  </div>
</div>

<script>
// ── CHANNEL CONFIG ──────────────────────────────────────────────
const CHANNELS = {
  today: {
    name: '오늘경제TV',
    accent: '#3b82f6',
    type: 'stock',
    desc: '한국 주식·경제 전문',
    tones: ['전문·분석적','긴박·위기감','쉽고 친근한','냉철·객관적','기회·희망적'],
    toneVals: ['전문적이고 분석적인','위기감과 긴장감 있는','쉽고 친근한 설명체','냉철하고 객관적인','기회를 강조하는 희망적인'],
    hints: ['메인 테마 힌트 (예: 방산, AI)','소부장 힌트 (예: 반도체 소재)'],
    sample: `여러분, 요즘 주변에서 반도체, AI 이야기로 돈 벌었다는 소리는 들리는데, 막상 내 주식 계좌를 열어보면 파란 불만 가득해서 속상하신 분들 참 많으시죠? 삼성전자는 언제 오르나 매일 쳐다보기도 지치셨을 거고요. 반가워요, 여러분의 계좌를 확실하게 심폐소생술 해드릴 '오늘경제TV' 채널이에요!

---<

우리가 주식 시장에서 돈을 벌려면 도대체 이 시장의 돈줄이 왜 반도체로만 쏠리는지, 그 본질적인 이유부터 아주 속 시원하게 파헤쳐 봐야 하거든요. 지금 온 세상이 인공지능, 즉 AI가 세상을 바꿀 거라고 난리잖아요. 그런데 이 똑똑한 AI가 제대로 작동하기 위해서 가장 필요한 핵심 부품이 바로 반도체인데, 지금 전 세계 내로라하는 천재들이 반도체 기술의 한계에 부딪혀서 골머리를 앓고 있다는 사실을 아셔야 해요.

---<

첫 번째로 여러분이 포트폴리오의 중심에 묵직하게 박아두셔야 할 메인 장비주는 바로 '오로스테크놀로지'라는 기업이에요. 앞서 제가 HBM은 반도체를 10층, 12층으로 높게 쌓아 올리고 수만 개의 구멍을 뚫어서 엘리베이터를 연결하는 기술이라고 말씀드렸잖아요.`,
    styleGuide: `[스타일 특징]
1. "~거든요","~잖아요","~인 거예요","~인 거죠" 구어체 유지
2. 어려운 개념 → 일상 비유로 설명 (아파트, 도로, 엘리베이터 등)
3. "미친 듯이","완벽하게","기가 막힌","어마어마한" 강한 표현 사용
4. 종목 소개: "첫 번째로 여러분이 포트폴리오의 중심에 묵직하게 박아두셔야 할 종목은 바로 'XX'예요" 형식
5. 실제 종목명+6자리 코드 반드시 명시 — "A사","B사" 절대 금지
6. 시황(12문단) → 메인 테마주 추천 → 소부장 추천 → 아웃트로`,
    step3prompt: (theme, narrative) => `너는 20년 경력 한국 주식 전문 애널리스트야.
반드시 실제 코스피/코스닥 상장 종목을 실명으로 추천해. 절대 "A사","B사","특정 기업" 금지.

테마: ${theme}
시황: ${narrative?.substring(0,300)}

후보 4~5개 뽑고 5가지 검증 후 최종 3~4개 선정:
1.테마 연관성 2.실적 모멘텀 3.수급/거래량 4.업사이드 여력 5.리스크 점검

마크다운 없이 순수 JSON:
{"candidates":[{"name":"실제종목명","code":"6자리코드","verifications":{"theme_relevance":{"pass":true,"reason":"구체근거"},"earnings_momentum":{"pass":true,"reason":"구체근거"},"supply_demand":{"pass":true,"reason":"구체근거"},"upside":{"pass":true,"reason":"구체근거"},"risk_check":{"pass":true,"reason":"구체근거"}},"final_pick":true,"pick_reason":"3문장 추천이유","investment_point":"핵심포인트"}]}`,
    step4prompt: (sobu, narrative) => `너는 20년 경력 한국 소부장 전문 애널리스트야.
실제 코스피/코스닥 소부장 종목 실명 추천. "A사","B사" 절대 금지.

분야: ${sobu}
시황: ${narrative?.substring(0,300)}

후보 3~4개, 5가지 검증 후 최종 2~3개:
1.공급망 연관성 2.수주 실적 3.기술 경쟁력 4.업사이드 여력 5.리스크 점검

마크다운 없이 순수 JSON:
{"candidates":[{"name":"실제종목명","code":"6자리코드","verifications":{"supply_chain":{"pass":true,"reason":""},"order_history":{"pass":true,"reason":""},"tech_competency":{"pass":true,"reason":""},"upside":{"pass":true,"reason":""},"risk_check":{"pass":true,"reason":""}},"final_pick":true,"pick_reason":"3문장 추천이유","investment_point":"핵심포인트"}]}`,
    scriptPrompt: (data) => `너는 '오늘경제TV' 유튜브 전문 대본 작가야.
아래 [참고 예시]의 스타일을 완벽히 따라 새 대본을 창작해. 단순 요약 금지, 살을 풍부하게 붙여 재창조해.

[참고 예시]
${data.sample}

${data.styleGuide}

[시황] ${data.narrative}
[핵심포인트] ${data.points}
[메인 테마주 검증 통과] ${data.mainPicks}
[소부장 검증 통과] ${data.sobuPicks}
[추가요청] ${data.extra||'없음'}

[대본 규칙]
1.글자수 5500~7700자 2.문단 ---< 로 시작 3.문단수 24~30개
4.구성: 인트로1 → 시황분석2~12 → 메인테마주13~22 → 아웃트로23~25
5.톤: ${data.tone} 6.종목명은 실제 회사명만 7.---< 부터 바로 시작`,
  },

  ripple: {
    name: '리플XRP 채널',
    accent: '#6366f1',
    type: 'coin',
    coin: 'XRP/리플',
    desc: 'XRP·리플 전문 분석',
    tones: ['소름돋는 분석','긴박·위기감','희망적 강세론','음모론적 시각','냉철·팩트'],
    toneVals: ['소름 돋는 분석과 예언적인','위기감과 긴장감이 넘치는','희망적이고 강세론적인','음모론적 시각의','냉철하고 팩트 기반의'],
    hints: ['관련 코인/테마 (예: XRP ETF, 리플 소송)','분석 포인트 (예: 기관 매집, 달러 붕괴)'],
    sample: `안녕하세요, 반갑습니다! 오늘도 우리 구독자 여러분의 소중한 자산을 지켜드리고, 돈의 흐름을 꿰뚫어 볼 수 있는 아주 뜨겁고 싱싱한 소식들 가득 들고 왔거든요. 지금 전 세계적으로 부채 위기와 달러 가치 하락, 그리고 블록체인 기반의 새로운 시대가 오고 있는데, 우리 엑스알피(XRP)가 그 중심에서 어떤 역할을 하게 될지 오늘 아주 낱낱이 파헤쳐 드릴게요.

---<

지금 중동 리스크가 금융 시스템 붕괴를 가속하는 의도적인 연극이라는 시각이 있는데, 사실 보이지 않는 곳에서는 무역 협정과 디지털 결제 인프라 개발이라는 거대한 전환이 소리 없이 이루어지고 있거든요. 오늘 이 영상에서는 왜 금융 시스템이 무너지고 있는지, 그리고 시스템 재편에 왜 리플이 절대적으로 필요한지 그 소름 돋는 이유를 아주 명쾌하게 분석해 드릴게요.

---<

function initSteps(list) {

  renderSteps();

function setStep(i, state, detail, verifications) {
  steps[i] = {...steps[i], state, detail, verifications: verifications || steps[i].verifications};
  renderSteps();
}
function renderSteps() {
  document.getElementById('pipe-steps').innerHTML = steps.map((s,i) => {
    let iconCls, iconTxt;
    if (s.state==='wait')      { iconCls='icon-wait'; iconTxt=i+1; }
    else if (s.state==='run')  { iconCls='icon-run';  iconTxt='<span class="spin">↻</span>'; }
    else if (s.state==='done') { iconCls='icon-done'; iconTxt='✓'; }
    else                       { iconCls='icon-err';  iconTxt='!'; }
    const verHtml = s.verifications
      ? '<div class="verify-row">'+s.verifications.map(v=>`<span class="vbadge ${v.pass===true?'vbadge-pass':v.pass===false?'vbadge-fail':'vbadge-wait'}">${v.label}</span>`).join('')+'</div>'
      : '';
    return `<div class="pipe-step">
      <div class="step-icon ${iconCls}">${iconTxt}</div>
      <div style="flex:1">
        <div class="step-title">${s.title}</div>
        ${s.detail ? `<div class="step-detail">${s.detail}</div>` : ''}
        ${verHtml}
      </div>
    </div>`;
  }).join('');
}

// ── GEMINI API ───────────────────────────────────────────────────
async function geminiCall(apiKey, prompt, maxTokens) {
  const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      contents:[{role:'user',parts:[{text:prompt}]}],
      generationConfig:{temperature:0.8, maxOutputTokens:maxTokens||4096}
    })
  });
  const d = await r.json();
  if (d.error) throw new Error(d.error.message);
  return d.candidates?.[0]?.content?.parts?.[0]?.text || '';
}

async function geminiStream(apiKey, prompt, onChunk) {
  const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:streamGenerateContent?alt=sse&key=${apiKey}`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      contents:[{role:'user',parts:[{text:prompt}]}],
      generationConfig:{temperature:0.85, maxOutputTokens:8192}
    })
  });
  if (!resp.ok) { const e = await resp.json(); throw new Error(e.error?.message||'API 오류 '+resp.status); }
  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let full = '';
  while (true) {
    const {done,value} = await reader.read();
    if (done) break;
    for (const line of decoder.decode(value,{stream:true}).split('\n')) {
      if (!line.startsWith('data: ')) continue;
      const data = line.slice(6).trim();
      if (!data || data==='[DONE]') continue;
      try { const t = JSON.parse(data).candidates?.[0]?.content?.parts?.[0]?.text; if(t){full+=t;onChunk(full);} } catch(e){}
    }
  }
  return full;
}

  document.getElementById('copy-btn').style.display = 'none';
  document.getElementById('stats-grid').style.display = 'none';

  const step3Label = ch.type === 'stock' ? '메인 테마주 5중 검증' : ch.type === 'stock_global' ? '글로벌 종목 5중 검증' : '메인 코인 5중 검증';
  const step4Label = ch.type === 'stock' ? '소부장 종목 5중 검증' : ch.type === 'stock_global' ? '공급망 종목 5중 검증' : '생태계 프로젝트 검증';

  initSteps([
    {title:'URL 콘텐츠 분석'},
    {title:'핵심 시황 추출 및 재창조 소재 정리'},
    {title:step3Label},
    {title:step4Label},
    {title:'최종 대본 생성 (5500~7700자)'},
  ]);

  try {
    // STEP 1
    setStep(0,'run',`${urls.length}개 URL 분석 중...`);
    const s1 = await geminiCall(apiKey,`다음 URL들의 내용을 분석해서 핵심 정보를 추출해주세요.
유튜브 URL이면 제목·채널명 기반으로, 뉴스 URL이면 기사 내용 기반으로 분석.
채널 타입: ${ch.desc}

URL 목록:
${urls.map((u,i)=>`[${i+1}] ${u}`).join('\n')}

마크다운 없이 순수 JSON:
{"sources":[{"url":"","type":"","keywords":[],"implications":"","mentioned_sectors":[]}]}`, 2000);

    let sourcesData;
    try { sourcesData = JSON.parse(s1.replace(/\`\`\`json|\`\`\`/g,'').trim()); }
    catch(e) { sourcesData = {sources:[]}; }
    const kwSummary = sourcesData.sources?.map(s=>s.keywords?.join(', ')).filter(Boolean).join(' / ') || '분석 완료';
    setStep(0,'done',`분석 완료: ${kwSummary}`);

    // STEP 2
    setStep(1,'run','시황 스토리 재구성 중...');
    const s2 = await geminiCall(apiKey,`분석된 소스 데이터:
${JSON.stringify(sourcesData,null,2)}

채널: ${ch.name} (${ch.desc})
이 채널 시청자를 위한 유튜브 대본용 시황 스토리를 구성해주세요.
단순 요약이 아니라 맥락·배경·연결고리를 붙여 살을 풍성하게.

마크다운 없이 순수 JSON:
{"main_narrative":"400자 이상 시황 스토리","key_points":["포인트1","포인트2","포인트3","포인트4","포인트5"],"market_mood":"시장 분위기 한 줄","suggested_main":"메인 테마/코인 추천","suggested_sub":"서브 분야 추천"}`, 2000);

    let narrativeData;
    try { narrativeData = JSON.parse(s2.replace(/\`\`\`json|\`\`\`/g,'').trim()); }
    catch(e) { narrativeData = {main_narrative:s2, key_points:[], market_mood:'', suggested_main:hint1, suggested_sub:hint2}; }
    const finalHint1 = hint1 || narrativeData.suggested_main || ch.coin || '주요 테마';
    const finalHint2 = hint2 || narrativeData.suggested_sub  || '관련 프로젝트';
    setStep(1,'done',`시황 구성 완료 | ${finalHint1} | ${finalHint2}`);

    // STEP 3
    const ver3Labels = ch.type==='stock'
      ? ['테마 연관성','실적 모멘텀','수급/거래량','업사이드','리스크']
      : ['테마 연관성','모멘텀','수급','업사이드','리스크'];
    setStep(2,'run','후보 발굴 중...',ver3Labels.map(l=>{return{label:l,pass:null}}));

    const s3 = await geminiCall(apiKey, ch.step3prompt(finalHint1, narrativeData.main_narrative), 3000);
    let mainData;
    try { mainData = JSON.parse(s3.replace(/\`\`\`json|\`\`\`/g,'').trim()); }
    catch(e) { mainData = {candidates:[]}; }
    const mainPicks = mainData.candidates?.filter(c=>c.final_pick) || mainData.candidates?.slice(0,4) || [];
    const ver3Keys = ['theme_relevance','earnings_momentum','supply_demand','upside','risk_check'];
    const agg3 = ver3Keys.map((k,ki)=>{return{label:ver3Labels[ki], pass:mainPicks.some(c=>c.verifications?.[k]?.pass)};});
    setStep(2,'done',`최종: ${mainPicks.map(c=>`${c.name}(${c.code})`).join(', ')||'분석완료'}`, agg3);

    // STEP 4
    const ver4Labels = ch.type==='stock'
      ? ['공급망 연관성','수주 실적','기술 경쟁력','업사이드','리스크']
      : ['생태계 연관성','실사용 현황','기술력','업사이드','리스크'];
    setStep(3,'run','서브 분야 발굴 중...',ver4Labels.map(l=>{return{label:l,pass:null}}));

    const s4 = await geminiCall(apiKey, ch.step4prompt(finalHint2, narrativeData.main_narrative), 3000);
    let sobuData;
    try { sobuData = JSON.parse(s4.replace(/\`\`\`json|\`\`\`/g,'').trim()); }
    catch(e) { sobuData = {candidates:[]}; }
    const sobuPicks = sobuData.candidates?.filter(c=>c.final_pick) || sobuData.candidates?.slice(0,3) || [];
    const ver4Keys = ['supply_chain','order_history','tech_competency','upside','risk_check'];
    const agg4 = ver4Keys.map((k,ki)=>{return{label:ver4Labels[ki], pass:sobuPicks.some(c=>c.verifications?.[k]?.pass)};});
    setStep(3,'done',`최종: ${sobuPicks.map(c=>`${c.name}(${c.code})`).join(', ')||'분석완료'}`, agg4);

    // STEP 5
    setStep(4,'run','대본 스트리밍 작성 중...');
    const mainPicksDesc = mainPicks.map(c=>`- ${c.name} (${c.code}): ${c.pick_reason} | 투자포인트: ${c.investment_point}`).join('\n');
    const sobuPicksDesc = sobuPicks.map(c=>`- ${c.name} (${c.code}): ${c.pick_reason} | 투자포인트: ${c.investment_point}`).join('\n');

    const finalScript = await geminiStream(apiKey, ch.scriptPrompt({
      sample: ch.sample,
      styleGuide: ch.styleGuide,
      narrative: narrativeData.main_narrative,
      points: narrativeData.key_points?.join('\n') || '',
      mainPicks: mainPicksDesc || '(분석완료)',
      sobuPicks: sobuPicksDesc || '(분석완료)',
      extra, tone,
    }), (partial) => {
      outputEl.textContent = partial;
      outputEl.scrollTop = outputEl.scrollHeight;
    });

    const charCount = finalScript.replace(/\s/g,'').length;
    const paraCount = (finalScript.match(/---</g)||[]).length;
    const mins = Math.round(finalScript.length/200);
    document.getElementById('stats-grid').innerHTML = `
      <div class="stat"><div class="stat-n">${charCount.toLocaleString()}자</div><div class="stat-l">글자수</div></div>
      <div class="stat"><div class="stat-n">${paraCount}개</div><div class="stat-l">문단수</div></div>
      <div class="stat"><div class="stat-n">약 ${mins}분</div><div class="stat-l">예상 영상시간</div></div>`;
    document.getElementById('stats-grid').style.display = 'grid';
    document.getElementById('copy-btn').style.display = 'block';
    setStep(4,'done',`완료 — ${charCount.toLocaleString()}자 / ${paraCount}문단`);

  } catch(err) {
    const ri = steps.findIndex(s=>s.state==='run');
    if (ri>=0) setStep(ri,'err','오류: '+err.message);
    outputEl.textContent = '오류: '+err.message+'\n\nAPI 키를 확인하거나 잠시 후 다시 시도해주세요.';
  }

  btn.disabled = false;
  btn.textContent = '분석 + 대본 생성 ↗';
}

function copyScript() {
  const text = document.getElementById('output-text').textContent;
  if (!text) return;
  navigator.clipboard.writeText(text).then(()=>{
    const btn = document.getElementById('copy-btn');
    btn.textContent = '복사됨!';
    setTimeout(()=>btn.textContent='복사', 1500);
  });
}

// ── INIT ─────────────────────────────────────────────────────────
document.documentElement.style.setProperty('--ch-accent', '#3b82f6');
renderSidebar();
</script>
</body>
</html>
